services:

  postgres:
    image: postgres:15
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      retries: 10

  db-init:
    build: ./db-init
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  fastapi:
    build: ./fastapi
    env_file: .env
    depends_on:
      db-init:
        condition: service_completed_successfully
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health"]
      interval: 10s
      retries: 5

  nginx:
    build: ./nginx
    env_file: .env
    depends_on:
      fastapi:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  pgdata:
