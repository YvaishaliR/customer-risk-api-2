<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Risk Lookup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f4f6;
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.10), 0 4px 16px rgba(0, 0, 0, 0.06);
      padding: 2rem;
      width: 100%;
      max-width: 540px;
    }

    h1 {
      font-size: 1.375rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: #111827;
    }

    .lookup-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.5rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 5px;
      font-size: 1rem;
      color: #111827;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
    }

    button {
      padding: 0.5rem 1.25rem;
      background: #3b82f6;
      color: #ffffff;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    button:hover:not(:disabled) { background: #2563eb; }

    button:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    #results { min-height: 1.5rem; }

    .loading {
      color: #6b7280;
      font-style: italic;
      font-size: 0.9375rem;
    }

    .error {
      color: #dc2626;
      font-size: 0.9375rem;
    }

    .customer-id {
      font-size: 0.8125rem;
      color: #6b7280;
      margin-bottom: 0.625rem;
    }

    .customer-id strong {
      color: #374151;
      font-weight: 600;
    }

    .tier-badge {
      display: inline-block;
      padding: 0.25rem 0.875rem;
      border-radius: 4px;
      font-size: 0.9375rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      margin-bottom: 1.25rem;
    }

    .tier-LOW    { background: #d1fae5; color: #065f46; }
    .tier-MEDIUM { background: #fef3c7; color: #92400e; }
    .tier-HIGH   { background: #fee2e2; color: #991b1b; }

    .factors-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #6b7280;
      margin-bottom: 0.5rem;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    li {
      padding: 0.5rem 0.75rem;
      background: #f9fafb;
      border-left: 3px solid #e5e7eb;
      border-radius: 0 4px 4px 0;
    }

    .factor-code {
      font-size: 0.8125rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.125rem;
    }

    .factor-desc {
      font-size: 0.875rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Customer Risk Lookup</h1>
    <div class="lookup-row">
      <input id="cid" type="text" placeholder="Enter customer ID" autocomplete="off" spellcheck="false" autofocus>
      <button id="btn">Look up</button>
    </div>
    <div id="results"></div>
  </div>

  <script>
    var input   = document.getElementById('cid');
    var btn     = document.getElementById('btn');
    var results = document.getElementById('results');

    function esc(s) {
      return String(s)
        .replace(/&/g,  '&amp;')
        .replace(/</g,  '&lt;')
        .replace(/>/g,  '&gt;')
        .replace(/"/g,  '&quot;')
        .replace(/'/g,  '&#39;');
    }

    function showResult(data) {
      var tier    = esc(data.tier);
      var factors = data.risk_factors.map(function(f) {
        return '<li>'
          + '<div class="factor-code">' + esc(f.factor_code) + '</div>'
          + '<div class="factor-desc">'  + esc(f.factor_description) + '</div>'
          + '</li>';
      }).join('');

      results.innerHTML =
        '<p class="customer-id">Customer: <strong>' + esc(data.customer_id) + '</strong></p>'
        + '<div><span class="tier-badge tier-' + tier + '">' + tier + '</span></div>'
        + '<p class="factors-label">Risk Factors</p>'
        + '<ul>' + factors + '</ul>';
    }

    function showError(msg) {
      results.innerHTML = '<p class="error">' + esc(msg) + '</p>';
    }

    function lookup() {
      var id = input.value.trim();
      results.innerHTML = '';
      if (!id) return;

      btn.disabled = true;
      results.innerHTML = '<p class="loading">Looking up…</p>';

      fetch('/api/risk/' + encodeURIComponent(id))
        .then(function(resp) {
          if (resp.status === 200) {
            return resp.json().then(function(data) { showResult(data); });
          } else if (resp.status === 404) {
            showError('Customer not found');
          } else if (resp.status === 401) {
            showError('Authentication error — contact your administrator');
          } else {
            showError('An unexpected error occurred (HTTP ' + resp.status + ')');
          }
        })
        .catch(function() {
          showError('An unexpected error occurred (network error)');
        })
        .finally(function() {
          btn.disabled = false;
        });
    }

    btn.addEventListener('click', lookup);
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') lookup();
    });
  </script>
</body>
</html>
